name: Performance Tests (k6)

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Cenário de teste'
        required: true
        default: 'load'
        type: choice
        options:
          - load
          - stress
          - spike
          - scenarios
          - all
      vus:
        description: 'Virtual Users (sobrescreve o default do script)'
        required: false
        default: ''
      duration:
        description: 'Duração do teste (ex: 5m, 10m)'
        required: false
        default: ''
      base_url:
        description: 'Base URL da API alvo'
        required: false
        default: 'https://reqres.in/api'
      ramp_up:
        description: 'Duração do ramp-up (ex: 1m, 2m)'
        required: false
        default: ''
      rate:
        description: 'Taxa de requisições/s (cenário arrival-rate)'
        required: false
        default: ''

  schedule:
    - cron: '0 15 * * *'

env:
  K6_BASE_URL: ${{ github.event.inputs.base_url || 'https://reqres.in/api' }}
  K6_VUS: ${{ github.event.inputs.vus || '' }}
  K6_DURATION: ${{ github.event.inputs.duration || '' }}
  K6_RAMP_UP: ${{ github.event.inputs.ramp_up || '' }}
  K6_RATE: ${{ github.event.inputs.rate || '' }}
  REQRES_KEY: ${{ secrets.REQRES_API_KEY || 'reqres_7b4880206ffa4e6b8429a7291998c7c5' }}

jobs:
  performance-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Load Test
        id: load_test
        if: ${{ github.event.inputs.scenario == 'load' || github.event.inputs.scenario == 'all' || github.event_name == 'schedule' }}
        continue-on-error: true
        run: |
          k6 run \
            -e REQRES_API_KEY=${{ env.REQRES_KEY }} \
            -e K6_BASE_URL=${{ env.K6_BASE_URL }} \
            -e K6_VUS=${{ github.event_name == 'schedule' && '50' || env.K6_VUS }} \
            -e K6_DURATION=${{ github.event_name == 'schedule' && '1m' || env.K6_DURATION }} \
            -e K6_RAMP_UP=${{ env.K6_RAMP_UP }} \
            scripts/load-test.js

      - name: Run Stress Test
        id: stress_test
        if: ${{ github.event.inputs.scenario == 'stress' || github.event.inputs.scenario == 'all' }}
        continue-on-error: true
        run: |
          k6 run \
            -e REQRES_API_KEY=${{ env.REQRES_KEY }} \
            -e K6_BASE_URL=${{ env.K6_BASE_URL }} \
            -e K6_VUS=${{ env.K6_VUS }} \
            -e K6_DURATION=${{ env.K6_DURATION }} \
            -e K6_RAMP_UP=${{ env.K6_RAMP_UP }} \
            scripts/stress-test.js

      - name: Run Spike Test
        id: spike_test
        if: ${{ github.event.inputs.scenario == 'spike' || github.event.inputs.scenario == 'all' }}
        continue-on-error: true
        run: |
          k6 run \
            -e REQRES_API_KEY=${{ env.REQRES_KEY }} \
            -e K6_BASE_URL=${{ env.K6_BASE_URL }} \
            -e K6_VUS=${{ env.K6_VUS }} \
            -e K6_DURATION=${{ env.K6_DURATION }} \
            scripts/spike-test.js

      - name: Run Scenarios Test (arrival-rate)
        id: scenarios_test
        if: ${{ github.event.inputs.scenario == 'scenarios' || github.event.inputs.scenario == 'all' }}
        continue-on-error: true
        run: |
          k6 run \
            -e REQRES_API_KEY=${{ env.REQRES_KEY }} \
            -e K6_BASE_URL=${{ env.K6_BASE_URL }} \
            -e K6_RATE=${{ env.K6_RATE }} \
            -e K6_DURATION=${{ env.K6_DURATION }} \
            -e K6_RAMP_UP=${{ env.K6_RAMP_UP }} \
            scripts/scenarios-test.js

      - name: Generate Allure Results
        if: always()
        run: node scripts/generate-allure-report.js

      - name: Generate Allure HTML Report
        if: always()
        run: npx allure generate allure-results -o allure-report --clean

      - name: Upload k6 JSON Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-json-reports-${{ github.run_number }}
          path: reports/*.json
          retention-days: 30

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_number }}
          path: allure-results/
          retention-days: 30

      - name: Upload Allure HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: allure-report/
          retention-days: 30

      - name: Quality Gate - Threshold Validation
        if: always()
        run: |
          echo "============================================"
          echo "  QUALITY GATE - Performance Thresholds"
          echo "============================================"
          GATE_FAILED=false

          if [ "${{ steps.load_test.outcome }}" == "failure" ]; then
            echo "FAIL: Load Test - thresholds exceeded"
            GATE_FAILED=true
          elif [ "${{ steps.load_test.outcome }}" == "success" ]; then
            echo "PASS: Load Test"
          fi

          if [ "${{ steps.stress_test.outcome }}" == "failure" ]; then
            echo "FAIL: Stress Test - thresholds exceeded"
            GATE_FAILED=true
          elif [ "${{ steps.stress_test.outcome }}" == "success" ]; then
            echo "PASS: Stress Test"
          fi

          if [ "${{ steps.spike_test.outcome }}" == "failure" ]; then
            echo "FAIL: Spike Test - thresholds exceeded"
            GATE_FAILED=true
          elif [ "${{ steps.spike_test.outcome }}" == "success" ]; then
            echo "PASS: Spike Test"
          fi

          if [ "${{ steps.scenarios_test.outcome }}" == "failure" ]; then
            echo "FAIL: Scenarios Test - thresholds exceeded"
            GATE_FAILED=true
          elif [ "${{ steps.scenarios_test.outcome }}" == "success" ]; then
            echo "PASS: Scenarios Test"
          fi

          echo "============================================"

          if [ "$GATE_FAILED" == "true" ]; then
            echo "RESULT: PIPELINE BLOCKED - One or more performance thresholds were not met."
            echo "Review the Allure Report artifact for detailed analysis."
            exit 1
          else
            echo "RESULT: PIPELINE APPROVED - All performance thresholds passed."
          fi
